

services:
  db:
    image: mysql:8.0
    container_name: campus_db
    environment:
      MYSQL_DATABASE: campus_management
      MYSQL_USER: campus_user
      MYSQL_PASSWORD: campus_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campus_network

  redis:
    image: redis:7-alpine
    container_name: campus_redis
    ports:
      - "6379:6379"
    networks:
      - campus_network

  ollama:
    image: ollama/ollama:latest
    container_name: campus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - campus_network

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus_celery
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=campus_management.settings
      - DB_HOST=db
      - DB_NAME=campus_management
      - DB_USER=campus_user
      - DB_PASSWORD=campus_password
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-django-insecure-development-key-here}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - AI_CHAT_CHROMA_PATH=/app/aichatbot/database/chroma_db
      - AI_CHAT_COLLECTION=event_qa
      - AI_CHAT_EMBED_MODEL=BAAI/bge-base-en-v1.5
      - AI_CHAT_DISTANCE_HIGH_CONF=0.6
      - AI_CHAT_DISTANCE_MED_CONF=0.9
      - AI_CHAT_USE_OLLAMA=true
      - AI_CHAT_OLLAMA_MODEL=gemma3:1b
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./aichatbot:/app/aichatbot
    command: celery -A campus_management worker --loglevel=info
    depends_on:
      - db
      - redis
      - backend
      - ollama
    networks:
      - campus_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus_backend
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=campus_management.settings
      - DB_HOST=db
      - DB_NAME=campus_management
      - DB_USER=campus_user
      - DB_PASSWORD=campus_password
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-django-insecure-development-key-here}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - AI_CHAT_CHROMA_PATH=/app/aichatbot/database/chroma_db
      - AI_CHAT_COLLECTION=event_qa
      - AI_CHAT_EMBED_MODEL=BAAI/bge-base-en-v1.5
      - AI_CHAT_DISTANCE_HIGH_CONF=0.5
      - AI_CHAT_DISTANCE_MED_CONF=0.75
      - AI_CHAT_USE_OLLAMA=true
      - AI_CHAT_OLLAMA_MODEL=gemma3:1b
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./aichatbot:/app/aichatbot
    depends_on:
      - db
      - redis
      - ollama
    networks:
      - campus_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - campus_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: campus_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - campus_network

volumes:
  mysql_data:
  ollama_data:


networks:
  campus_network:
    driver: bridge
