name: Staging Deployment

on:
  push:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Build frontend for staging
      working-directory: frontend
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.STAGING_API_URL }}

    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Deploy to staging server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          cd /var/www/cluborax-staging
          git pull origin develop
          
          # Deploy frontend
          cd frontend
          npm ci
          npm run build
          
          # Deploy backend
          cd ../backend
          python -m pip install -r requirements.txt
          python manage.py migrate
          python manage.py collectstatic --noinput
          
          # Restart services
          sudo systemctl restart gunicorn-staging
          sudo systemctl restart nginx-staging

    - name: Run smoke tests
      run: |
        sleep 30
        response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.STAGING_URL }}/api/health/)
        if [ $response -eq 200 ]; then
          echo "✅ Staging deployment successful"
        else
          echo "❌ Staging deployment failed"
          exit 1
        fi
