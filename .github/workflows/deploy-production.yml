name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Pull latest images
      run: |
        docker pull ghcr.io/${{ github.repository }}-backend:latest
        docker pull ghcr.io/${{ github.repository }}-frontend:latest
        
    - name: Create environment file
      run: |
        cat > .env << EOF
        DB_NAME=${{ secrets.PROD_DB_NAME }}
        DB_USER=${{ secrets.PROD_DB_USER }}
        DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
        DB_ROOT_PASSWORD=${{ secrets.PROD_DB_ROOT_PASSWORD }}
        SECRET_KEY=${{ secrets.PROD_SECRET_KEY }}
        ALLOWED_HOSTS=${{ secrets.PROD_ALLOWED_HOSTS }}
        GITHUB_REPOSITORY=${{ github.repository }}
        EOF
        
    - name: Deploy to production
      run: |
        docker-compose -f docker-compose.prod.yml down
        docker-compose -f docker-compose.prod.yml up -d
        
    - name: Health check
      run: |
        sleep 60
        curl -f http://localhost:8000/health/ || exit 1
        curl -f http://localhost/ || exit 1
        
    - name: Run smoke tests
      run: |
        # Add comprehensive smoke tests here
        curl -f http://localhost/api/events/ || exit 1
        curl -f http://localhost/api/clubs/ || exit 1
        
    - name: Cleanup
      run: rm .env
