name: Deploy to Production

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    outputs:
      frontend-sha: ${{ steps.frontend-sha.outputs.sha }}
      backend-sha: ${{ steps.backend-sha.outputs.sha }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Frontend CI
      uses: ./.github/workflows/frontend-ci.yml

    - name: Backend CI
      uses: ./.github/workflows/backend-ci.yml

    - name: Get frontend SHA
      id: frontend-sha
      run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

    - name: Get backend SHA
      id: backend-sha
      run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-frontend:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/master'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Build for production
      working-directory: frontend
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /var/www/cluborax
          mkdir -p backup/frontend-$(date +%Y%m%d-%H%M%S)
          cp -r frontend/html backup/frontend-$(date +%Y%m%d-%H%M%S)/ || true

    - name: Upload frontend files
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        source: "frontend/dist/*"
        target: "/var/www/cluborax/frontend/html"
        strip_components: 2

    - name: Restart frontend service
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          sudo systemctl reload nginx || sudo systemctl restart nginx

  deploy-backend:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/master'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create deployment package
      run: |
        tar -czf backend-deploy.tar.gz backend/ --exclude='backend/__pycache__' --exclude='backend/.pytest_cache' --exclude='backend/coverage.xml' --exclude='backend/htmlcov'

    - name: Upload backend to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        source: "backend-deploy.tar.gz"
        target: "/tmp/"

    - name: Deploy backend on server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /var/www/cluborax
          mkdir -p backup/backend-$(date +%Y%m%d-%H%M%S)
          cp -r backend backup/backend-$(date +%Y%m%d-%H%M%S)/ || true
          
          tar -xzf /tmp/backend-deploy.tar.gz -C ./
          rm /tmp/backend-deploy.tar.gz
          
          cd backend
          python -m pip install -r requirements.txt
          python manage.py migrate
          python manage.py collectstatic --noinput
          
          sudo systemctl restart gunicorn
          sudo systemctl restart celery

  health-check:
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: success()

    steps:
    - name: Wait for deployment
      run: sleep 30

    - name: Health check
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/api/health/)
        if [ $response -eq 200 ]; then
          echo "✅ Deployment successful - Health check passed"
        else
          echo "❌ Deployment failed - Health check returned $response"
          exit 1
        fi

    - name: Notify deployment
      if: success()
      run: |
        curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H 'Content-type: application/json' \
          --data "{\"text\":\"🚀 CluboraX deployed successfully to production\\nCommit: ${{ github.sha }}\\nBranch: ${{ github.ref_name }}\"}"
