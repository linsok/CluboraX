name: Deploy Only

on:
  push:
    branches: [ main, master, develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build backend image
      run: |
        cd backend
        docker build -t ghcr.io/linsok/cluborax-backend:latest .
        docker push ghcr.io/linsok/cluborax-backend:latest

    - name: Build frontend image
      run: |
        cd frontend
        docker build -t ghcr.io/linsok/cluborax-frontend:latest .
        docker push ghcr.io/linsok/cluborax-frontend:latest

    - name: Deployment complete
      run: |
        echo "✅ Images built and pushed successfully!"
        echo "🚀 Ready for deployment"
        if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          echo "📦 Staging deployment ready"
        else
          echo "🌐 Production deployment ready"
        fi
